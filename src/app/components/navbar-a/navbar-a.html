<nav class="mod-nav">
  <div class="nav-wrapper">

    <!-- Error -->
    <p *ngIf="error" class="mod-error">
      <span>⚠</span> {{ error }}
    </p>

    <!-- Barra de carga -->
    <div *ngIf="isLoading" class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>

    <!-- Botones de módulos -->
    <div
      *ngIf="!isLoading && modulos.length > 0"
      class="mod-buttons-container"
      [class.open]="isMenuOpen">
      <button
        *ngFor="let m of modulos"
        class="mod-btn"
        (click)="ir(m.ruta)">
        {{ m.nombre }}
      </button>
    </div>

    <!-- Sin módulos -->
    <p *ngIf="!isLoading && modulos.length === 0" class="empty-message">
      <span>📭</span> No hay módulos asignados para tu rol.
    </p>

  </div>
</nav>
