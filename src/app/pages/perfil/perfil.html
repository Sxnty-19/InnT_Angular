<h1>Perfil</h1>

<div class="principal-content">

    <h3>Editar Cuenta</h3>
    <h5>Los campos marcados con * son obligatorios</h5>

    <form [formGroup]="perfilForm" (ngSubmit)="actualizarUsuario()">

        <div>
            <label>Primer Nombre *</label>
            <input type="text" formControlName="primer_nombre">
        </div>

        <div>
            <label>Segundo Nombre</label>
            <input type="text" formControlName="segundo_nombre">
        </div>

        <div>
            <label>Primer Apellido *</label>
            <input type="text" formControlName="primer_apellido">
        </div>

        <div>
            <label>Segundo Apellido</label>
            <input type="text" formControlName="segundo_apellido">
        </div>

        <div>
            <label>Teléfono</label>
            <input type="text" formControlName="telefono">
        </div>

        <button type="submit" [disabled]="perfilForm.invalid">
            Actualizar
        </button>

    </form>

</div>


<!-- SECCIÓN DOCUMENTOS -->

    <!-- FORMULARIO NUEVO DOCUMENTO -->

    <div class="form-documento">

        <h3>Agregar Documento</h3>

        <form>

            <div>
                <label>Tipo</label>
                <select>
                    <option value="">Seleccione</option>
                    <option>Cédula</option>
                    <option>Pasaporte</option>
                    <option>Licencia</option>
                </select>
            </div>

            <div>
                <label>Número</label>
                <input type="text">
            </div>

            <div>
                <label>Lugar de Expedición</label>
                <input type="text">
            </div>

            <div>
                <label>Agregar Foto</label>

            </div>

            <button type="submit">

        </form>

    </div>

</div>
