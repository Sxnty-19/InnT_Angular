<h1>Perfil</h1>

<div class="principal-content">

    <h3>Editar Cuenta</h3>
    <h5>Los campos marcados con * son obligatorios</h5>

    <form [formGroup]="perfilForm" (ngSubmit)="actualizarUsuario()">

        <div>
            <label>Primer Nombre *</label>
            <input type="text" formControlName="primer_nombre">
        </div>

        <div>
            <label>Segundo Nombre</label>
            <input type="text" formControlName="segundo_nombre">
        </div>

        <div>
            <label>Primer Apellido *</label>
            <input type="text" formControlName="primer_apellido">
        </div>

        <div>
            <label>Segundo Apellido</label>
            <input type="text" formControlName="segundo_apellido">
        </div>

        <div>
            <label>Teléfono</label>
            <input type="text" formControlName="telefono">
        </div>

        <button type="submit" [disabled]="perfilForm.invalid">
            Actualizar
        </button>

    </form>

</div>


<!-- SECCIÓN DOCUMENTOS -->

<div class="principal-content">

    <h2>Documentos</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Tipo</th>
                <th>Número</th>
                <th>Lugar</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>

            <tr *ngFor="let d of documentos">

                <td>{{d.id_documento}}</td>
                <td>{{d.tipo_documento}}</td>
                <td>{{d.numero_documento}}</td>
                <td>{{d.lugar_expedicion}}</td>

                <td>
                    <span *ngIf="d.estado == 1">Activo</span>
                    <span *ngIf="d.estado == 0">Inactivo</span>
                </td>

            </tr>

        </tbody>

    </table>


    <!-- FORMULARIO NUEVO DOCUMENTO -->

    <div class="form-documento">

        <h3>Agregar Documento</h3>

        <form [formGroup]="documentoForm" (ngSubmit)="crearDocumento()">

            <div>
                <label>Tipo</label>

                <select formControlName="id_tdocumento">

                    <option value="">Seleccione</option>

                    <option *ngFor="let t of tiposDoc" [value]="t.id_tdocumento">
                        {{t.nombre}}
                    </option>

                </select>

            </div>

            <div>
                <label>Número</label>
                <input type="text" formControlName="numero_documento">
            </div>

            <div>
                <label>Lugar de Expedición</label>
                <input type="text" formControlName="lugar_expedicion">
            </div>

            <button type="submit">
                Agregar
            </button>

        </form>

    </div>

</div>

<app-footer></app-footer>
